apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "speckle-dui.fullname" . }}
  labels:
    {{- include "speckle-dui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "speckle-dui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "speckle-dui.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "speckle-dui.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80 # Needs to match port defined in deployment/docker/configuration.toml
              protocol: TCP
          {{- if .Values.observability.hyperdx.enabled }}
          # Browser OpenTelemetry (HyperDX RUM), for parity with the speckle-server chart.
          # NOTE: the DUI is a static bundle, so these must be baked at image build time to
          # take effect (see deployment/docker/Dockerfile). Surfaced here for parity/intent.
          env:
            - name: NUXT_PUBLIC_HYPERDX_ENABLED
              value: "true"
            - name: NUXT_PUBLIC_HYPERDX_COLLECTOR_URL
              value: {{ .Values.observability.hyperdx.browserCollectorUrl | quote }}
            - name: NUXT_PUBLIC_HYPERDX_INGESTION_KEY
              value: {{ .Values.observability.hyperdx.ingestionKey | quote }}
            - name: NUXT_PUBLIC_HYPERDX_OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.observability.hyperdx.otelResourceAttributes | quote }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: configuration
              mountPath: /app/configuration.toml
              subPath: configuration.toml
              readOnly: true
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: configuration
          configMap:
            name: {{ include "speckle-dui.fullname" . }}-configuration
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
